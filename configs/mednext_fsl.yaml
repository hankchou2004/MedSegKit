experiment:
  name: mednext_fsl_oasis1
  log_dir: ./logs

model:
  name: mednext
  in_channels: 1
  out_channels: 4
  enc_num_block: [2, 2, 2, 2]
  dec_num_block: [2, 2, 2, 2]

data:
  dataset_root: /home/hank/medical_segmention/dataset
  splits_csv: /home/hank/medical_segmention/oasis1_splits.csv
  modality: fsl
  patch_size: [128, 128, 128]
  batch_size: 1
  num_workers: 4
  cache_rate: 0.05

training:
  max_epochs: 300
  lr: 1.0e-4
  weight_decay: 1.0e-5
  loss: dice_ce
